<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoFlop — BTC / BNB</title>
<link rel="icon" type="image/svg+xml" href="logo/cryptoflop-monogram.svg">
<style>
  :root {
    --bg:        #0d1117;
    --bg-soft:   #11161f;
    --panel:     #161c27;
    --panel-2:   #1c2330;
    --border:    #232b3a;
    --text:      #e6e9ef;
    --muted:     #8a93a6;
    --muted-2:   #7d8597;  /* podbite z #6b7385 do progu WCAG AA (~4.6:1 na panelu) — audyt 2026-06-25 */
    --accent:    #c4a878;

    --c-0:   #dc2626;
    --c-15:  #ef4444;
    --c-30:  #f97316;
    --c-45:  #9ca3af;
    --c-55:  #84cc16;
    --c-65:  #4ade80;
    --c-75:  #22c55e;
    --c-85:  #16a34a;
    --c-100: #15803d;
    --pos: #22c55e;
    --neg: #ef4444;
    /* Zmiana ceny 24h — własny, STONOWANY rejestr (niższa saturacja niż vivid
       zieleń/czerwień wyniku okazji). Kierunek ceny czyta się od razu, ale nie
       konkuruje z wielką liczbą "kupuj" ani z kropkami sygnałów (2026-06-28). */
    --chg-up:   #5fa87d;
    --chg-down: #d07b72;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    background-image:
      radial-gradient(1200px 600px at 20% -10%, rgba(196,168,120,0.04), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(63,93,98,0.06), transparent 60%);
    color: var(--text);
    font-family: "Helvetica Neue", "Helvetica", "Arial", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px; line-height: 1.55;
    min-height: 100vh;
    overscroll-behavior-x: none;
  }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }
  .view.hidden { display: none; }

  header.top { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 44px; flex-wrap: wrap; }
  header.top .brand { display: flex; align-items: center; color: #ffffff; }
  header.top .brand .brand-logo { height: 34px; width: auto; display: block; }
  header.top .date-block { text-align: right; line-height: 1.3; }
  header.top .date { color: var(--muted); font-size: 13px; }
  header.top .date-refresh { color: var(--muted-2); font-size: 11px; margin-top: 2px; letter-spacing: 0.02em; }

  /* HOME — jeden kafelek na asset: wynik OKAZJI (zielony = kupuj) + 2 sygnały */
  .widgets { display: flex; flex-direction: column; gap: 16px; }
  .asset-card {
    width: 100%; text-align: left; display: block;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 20px 22px;
    transition: background 120ms, border-color 120ms, transform 120ms ease;
  }
  button.asset-card:hover { background: var(--panel-2); border-color: #2f384a; }
  button.asset-card:active { transform: scale(0.997); }

  .ac-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .ac-name { font-size: 13px; color: var(--muted); letter-spacing: 0.01em; }
  .ac-name strong { color: var(--text); font-weight: 600; }
  .ac-price { font-size: 14px; color: var(--text); font-weight: 600; white-space: nowrap; }
  .ac-price .ac-chg { color: var(--muted-2); font-weight: 500; font-size: 12px; margin-left: 7px; }
  /* Zmiana ceny 24h: wzrost=zielony, spadek=czerwony (na życzenie 2026-06-28).
     Kolorujemy samą liczbę; sufiks "24h" zostaje wyciszony. */
  .chg-pos  { color: var(--chg-up); font-weight: 500; }
  .chg-neg  { color: var(--chg-down); font-weight: 500; }
  .chg-flat { color: var(--muted-2); font-weight: 500; }

  .ac-hero { display: flex; align-items: baseline; gap: 14px; }
  .ac-opp { font-size: 64px; font-weight: 700; line-height: 0.88; letter-spacing: -0.02em; color: var(--opp-color); }
  .ac-word { font-size: 24px; font-weight: 700; letter-spacing: 0.01em; color: var(--opp-color); }
  .ac-scale { font-size: 13px; color: var(--muted-2); font-weight: 500; align-self: flex-end; margin-bottom: 4px; }
  .ac-sub { margin-top: 10px; font-size: 13.5px; color: var(--muted); line-height: 1.45; }
  .ac-sub.opp { color: var(--accent); font-weight: 600; }

  .ac-signals { margin-top: 18px; border-top: 1px solid var(--border); }
  .ac-sig { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .ac-sig:last-child { border-bottom: none; padding-bottom: 0; }
  .ac-sig-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-2); width: 60px; flex-shrink: 0; }
  .ac-sig-text { font-size: 13.5px; color: var(--text); flex: 1; }
  .sig-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .sig-dot.good { background: var(--pos); }
  .sig-dot.warn { background: var(--neg); }
  .sig-dot.neutral { background: var(--c-45); }

  /* Pasek "ostatnie 30 dni" — okazja dzień po dniu (kolor na skali okazji) */
  .ac-strip-wrap { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .ac-strip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-2); margin-bottom: 8px; }
  .ac-strip { display: flex; gap: 2px; height: 16px; }
  .ac-strip .ac-day { flex: 1; border-radius: 1.5px; }
  .ac-strip-axis { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--muted-2); letter-spacing: 0.02em; }

  /* DETAIL panels (swipe pager) */
  .swipe-container { overflow: hidden; touch-action: pan-y; user-select: none; }
  .swipe-track { display: flex; width: 200%; transform: translateX(0); will-change: transform; }
  .detail-panel { width: 50%; flex-shrink: 0; padding-right: 12px; }
  .detail-panel:last-child { padding-right: 0; padding-left: 12px; }

  h3.section {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); font-weight: 600; margin: 0 0 4px;
  }
  .section-sub {
    font-size: 12.5px; color: var(--muted-2);
    margin: 0 0 14px; max-width: 72ch; line-height: 1.5;
  }
  section.block { margin-bottom: 24px; }

  /* Werdykt "Czy warto dziś kupić?" — hero detalu (wynik okazji + skala + 4 sygnały) */
  .verdict-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px;
  }
  .vb-price { font-size: 13px; color: var(--muted-2); margin-bottom: 14px; }
  .verdict-row { display: flex; align-items: baseline; gap: 14px; }
  .verdict-opp { font-size: 60px; font-weight: 700; line-height: 0.88; letter-spacing: -0.02em; color: var(--opp-color); }
  .verdict-word { font-size: 26px; font-weight: 700; color: var(--opp-color); }
  .verdict-sub { margin-top: 10px; font-size: 13.5px; font-weight: 600; color: var(--muted); }
  .verdict-sub.opp { color: var(--accent); }
  .verdict-headline { margin: 14px 0 0; font-size: 14px; color: #c8cdd9; line-height: 1.6; }
  .scale-wrap { margin-top: 20px; }
  .scale-bar {
    position: relative; height: 8px; border-radius: 4px;
    /* Przystanki wyrównane do punktów łamania scoreColor (16/28/42/54/66/76/84/90),
       żeby marker (kolor = scoreColor) zawsze siedział na pasku w swoim kolorze. */
    background: linear-gradient(90deg, #dc2626 8%, #ef4444 22%, #f97316 35%, #9ca3af 48%, #84cc16 60%, #4ade80 71%, #22c55e 80%, #16a34a 87%, #15803d 95%);
    opacity: 0.85;
  }
  .scale-marker {
    position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
    transform: translate(-50%, -50%); border: 2.5px solid #fff; box-sizing: border-box;
  }
  .scale-labels {
    display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-2);
  }
  .signal-list { list-style: none; margin: 18px 0 0; padding: 0; }
  .signal-list li {
    display: flex; align-items: baseline; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .signal-list li:last-child { border-bottom: none; padding-bottom: 2px; }
  .signal-list .sig-dot { align-self: center; }
  .sig-label {
    color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    flex-shrink: 0; width: 96px;
  }
  .sig-text { color: var(--text); line-height: 1.45; }
  .verdict-foot {
    margin-top: 14px; font-size: 11px; color: var(--muted-2); font-style: italic; line-height: 1.5;
  }

  /* Prognoza okazji 7d — pasmo + konwikcja + rozbicie reguł + disclaimer */
  .forecast-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px 20px;
  }
  .forecast-block .fc-head {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 16px; color: var(--text); font-weight: 600; letter-spacing: -0.01em;
  }
  /* Strzałka kierunku w wyciszonym szarym, NIE na skali okazji — zielona
     strzałka "okno się domyka" (↘) byłaby sprzeczna (zielony = kupuj). */
  .forecast-block .fc-head .fc-arrow { font-size: 20px; color: var(--muted-2); font-weight: 700; line-height: 1; }
  .forecast-block .fc-head .fc-conf { font-size: 12px; color: var(--muted); font-weight: 400; }
  .fc-rules { list-style: none; margin: 12px 0 0; padding: 0; }
  .fc-rules li {
    display: flex; gap: 10px; align-items: baseline; padding: 8px 0;
    border-bottom: 1px solid var(--border); font-size: 12.5px;
  }
  .fc-rules li:last-child { border-bottom: none; }
  .fc-rule-name { color: var(--muted); width: 104px; flex-shrink: 0; }
  .fc-rule-delta { font-weight: 700; width: 28px; flex-shrink: 0; text-align: right; }
  .fc-rule-delta.pos { color: var(--pos); }
  .fc-rule-delta.neg { color: var(--neg); }
  .fc-rule-delta.zero { color: var(--muted-2); }
  .fc-rule-note { color: var(--muted); line-height: 1.4; }
  .fc-sum { margin-top: 10px; font-size: 12px; color: var(--muted); }
  .fc-disclaimer { margin-top: 12px; font-size: 11px; font-style: italic; color: var(--muted-2); line-height: 1.5; }

  /* Barograf na detalu — linia 30d + stożek prognozy */
  .fc-baro { margin: 2px 0 16px; }
  .fc-baro-svg { width: 100%; height: auto; display: block; }
  .fc-baro-axis { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--muted-2); letter-spacing: 0.02em; }

  footer {
    margin-top: 36px; padding-top: 22px; border-top: 1px solid var(--border);
    color: var(--muted-2); font-size: 11px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .legend { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .legend .swatch { display: inline-block; width: 26px; height: 12px; border-radius: 2px; }
  .legend .lbl { color: var(--muted-2); font-size: 10px; margin: 0 4px; }
  .copyright { width: 100%; text-align: center; padding-top: 18px; margin-top: 14px; border-top: 1px solid var(--border); color: var(--muted-2); font-size: 11px; }

  /* Stopka home — link do "Zasady działania" */
  footer.home-foot {
    margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    color: var(--muted-2); font-size: 12px;
  }
  .home-foot-link { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; transition: color 120ms, border-color 120ms; }
  .home-foot-link:hover { color: var(--text); border-bottom-color: var(--muted); }

  /* ===== iOS-NATIVE MODAL SHEET (per Apple HIG) ===== */
  #detail-view {
    position: fixed; top: 10px; left: 0; right: 0; bottom: 0;
    overflow-y: auto; overflow-x: hidden;
    background: var(--panel);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    transform: translateY(calc(100% + 10px));
    transition: transform 460ms cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 150;
    will-change: transform;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 -1px 0 rgba(255,255,255,0.04), 0 -16px 40px rgba(0, 0, 0, 0.45);
  }
  #detail-view.hidden { display: block !important; pointer-events: none; }
  #detail-view:not(.hidden) { transform: translateY(0); pointer-events: auto; }

  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 400ms ease;
    z-index: 140;
  }
  body.sheet-open .sheet-backdrop { opacity: 1; pointer-events: auto; }
  body.sheet-open #home-view {
    transform: scale(0.94);
    border-radius: 12px;
    transition: transform 460ms cubic-bezier(0.32, 0.72, 0, 1), border-radius 460ms ease;
    transform-origin: top center;
    overflow: hidden;
  }

  .sheet-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(28, 35, 48, 0.72);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .sheet-handle {
    width: 36px; height: 5px; border-radius: 2.5px;
    background: rgba(255, 255, 255, 0.45);
    margin: 5px auto 0;
  }
  .sheet-nav {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
    padding: 6px 8px 8px;
    min-height: 44px;
  }
  .sheet-close-x {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    justify-self: end;
    background: transparent;
    transition: opacity 120ms;
  }
  .sheet-close-x:active { opacity: 0.55; }
  .sheet-close-x .x-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.75);
    font-size: 13px; font-weight: 700;
    line-height: 1;
    transition: background 120ms;
  }
  .sheet-close-x:hover .x-mark { background: rgba(255, 255, 255, 0.2); }
  .asset-title {
    text-align: center; display: flex; flex-direction: column;
    align-items: center; line-height: 1.1; justify-self: center;
  }
  .asset-title-name { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .asset-title-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.01em; }
  .nav-spacer { width: 44px; justify-self: start; }
  .sheet-content { padding: 18px 24px 40px; }

  @media (max-width: 600px) {
    .wrap { padding: 24px 14px 60px; }
    header.top { margin-bottom: 26px; gap: 12px; }
    header.top .brand .brand-logo { height: 29px; }
    header.top .date { font-size: 12px; }
    .widgets { gap: 12px; }
    .asset-card { padding: 18px 18px; }
    .ac-opp { font-size: 52px; }
    .ac-word { font-size: 21px; }
    .verdict-opp { font-size: 50px; }
    .verdict-word { font-size: 22px; }
    .sig-label { width: 84px; }
    .detail-panel { padding-right: 6px; }
    .detail-panel:last-child { padding-left: 6px; }
    .sheet-content { padding: 14px 16px 32px; }
    .sheet-nav { padding: 4px 12px 10px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME VIEW -->
  <div id="home-view" class="view">
    <header class="top">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 720 120" xmlns="http://www.w3.org/2000/svg" aria-label="CryptoFlop">
          <text x="360" y="60" text-anchor="middle" dominant-baseline="central" font-family="Helvetica Neue, Helvetica, Inter, Arial, sans-serif" font-weight="500" font-size="96" letter-spacing="-1.44" fill="currentColor" style="font-feature-settings: 'liga' 0, 'calt' 0;">CryptoFlop</text>
        </svg>
      </div>
      <div class="date-block">
        <div class="date" id="home-date"></div>
        <div class="date-refresh" id="home-refresh"></div>
      </div>
    </header>

    <div class="widgets" id="home-widgets"></div>

    <footer class="home-foot">
      <a class="home-foot-link" href="zasady.html">Zasady działania</a>
      <span aria-hidden="true">·</span>
      <span class="home-foot-copy">© 2026 Marcin Gałęcki</span>
    </footer>
  </div>

  <!-- DETAIL VIEW (iOS-style modal sheet) -->
  <div id="detail-view" class="view hidden">
    <div class="sheet-header" id="sheet-header">
      <div class="sheet-handle"></div>
      <nav class="sheet-nav">
        <div class="nav-spacer"></div>
        <div class="asset-title">
          <span class="asset-title-name" id="detail-name"></span>
          <span class="asset-title-sub" id="detail-sub"></span>
        </div>
        <button class="sheet-close-x" id="back-btn" aria-label="Zamknij">
          <span class="x-mark">✕</span>
        </button>
      </nav>
    </div>

    <div class="sheet-content">
      <div class="swipe-container" id="swipe-container">
        <div class="swipe-track" id="swipe-track">
          <div class="detail-panel" data-asset="btc"></div>
          <div class="detail-panel" data-asset="bnb"></div>
        </div>
      </div>

      <footer>
        <div class="legend">
          Skala okazji 0–100:
          <span class="swatch" style="background:var(--c-0)"></span>
          <span class="swatch" style="background:var(--c-15)"></span>
          <span class="swatch" style="background:var(--c-30)"></span>
          <span class="swatch" style="background:var(--c-45)"></span>
          <span class="swatch" style="background:var(--c-55)"></span>
          <span class="swatch" style="background:var(--c-65)"></span>
          <span class="swatch" style="background:var(--c-75)"></span>
          <span class="swatch" style="background:var(--c-85)"></span>
          <span class="swatch" style="background:var(--c-100)"></span>
          <span class="lbl">0 drogo · 50 neutralnie · 100 okazja (zielony = kupuj)</span>
        </div>
        <div class="copyright">© 2026 Marcin Gałęcki</div>
      </footer>
    </div>
  </div>

  <!-- Sheet backdrop (darkens home behind the sheet) -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>

</div>

<script>
/* Punkty łamania zsynchronizowane z progami werdyktu (OPP_TAK=42, OPP_OKAZJA=84,
   "wyjątkowa"=90) — audyt 2026-06-25. Dzięki temu: pomarańcz "drogo" kończy się
   dokładnie na progu KUP (42), więc kolor nigdy nie maluje KUP na "drogo"; OKAZJA
   (>=84) dostaje własną głębszą zieleń (c-85), a "wyjątkowa" (>=90) najgłębszą. */
function scoreColor(s){
  if (s<16)  return "var(--c-0)";   // Przegrzane
  if (s<28)  return "var(--c-15)";  // Drogo
  if (s<42)  return "var(--c-30)";  // Raczej drogo (pomarańcz kończy się na progu KUP)
  if (s<54)  return "var(--c-45)";  // KUP — neutralny szary
  if (s<66)  return "var(--c-55)";  // KUP — lime
  if (s<76)  return "var(--c-65)";  // KUP — zieleń
  if (s<84)  return "var(--c-75)";  // KUP górny — mocna zieleń
  if (s<90)  return "var(--c-85)";  // OKAZJA — głęboka zieleń
  return "var(--c-100)";            // Wyjątkowa okazja — najgłębsza zieleń
}

function chgClass(v) {
  return v > 0 ? "chg-pos" : v < 0 ? "chg-neg" : "chg-flat";
}

function fmtPct(v) {
  const sign = v > 0 ? "+" : "";
  const valStr = (typeof v === "number") ? String(v).replace(".", ",") : v;
  return `${sign}${valStr}%`;
}

function forecastArrow(direction) {
  if (direction === "up") return "↗";
  if (direction === "down") return "↘";
  return "→";
}
function confLabelPl(c) {
  if (c === "high") return "wysoka";
  if (c === "medium") return "średnia";
  return "niska";
}

/* ---------- HOME CARD ---------- */
function homeSignalsHtml(v) {
  return (v.home_signals || []).map(s => `
    <div class="ac-sig">
      <span class="ac-sig-label">${s.label}</span>
      <span class="ac-sig-text">${s.text}</span>
      <span class="sig-dot ${s.tone}"></span>
    </div>`).join("");
}

function strip30Html(opp30) {
  if (!opp30 || opp30.length < 2) return "";
  const days = opp30.map(o => `<span class="ac-day" style="background:${scoreColor(o)}"></span>`).join("");
  return `
    <div class="ac-strip-wrap">
      <div class="ac-strip-label">Ostatnie 30 dni — okazja</div>
      <div class="ac-strip">${days}</div>
      <div class="ac-strip-axis"><span>30 dni temu</span><span>dziś</span></div>
    </div>`;
}

function assetCardInnerHtml(asset) {
  const v = asset.verdict || {};
  const subCls = v.level === "okazja" ? "opp" : "";
  return `
    <div class="ac-head">
      <span class="ac-name"><strong>${asset.name}</strong> · ${asset.sub}</span>
      <span class="ac-price">${asset.price}<span class="ac-chg"><span class="${chgClass(asset.price_change_24h)}">${fmtPct(asset.price_change_24h)}</span> 24h</span></span>
    </div>
    <div class="ac-hero">
      <span class="ac-opp">${asset.opp}</span>
      <span class="ac-word">${v.word || ""}</span>
      <span class="ac-scale">/100</span>
    </div>
    <div class="ac-sub ${subCls}">${v.sublabel || ""}</div>
    <div class="ac-signals">${homeSignalsHtml(v)}</div>
    ${strip30Html(asset.opp_30d)}
  `;
}

function renderHomeWidget(asset) {
  const card = document.createElement("button");
  card.className = "asset-card";
  card.dataset.asset = asset.key;
  card.style.setProperty("--opp-color", scoreColor(asset.opp));
  card.addEventListener("click", () => navigate(asset.key));
  card.innerHTML = assetCardInnerHtml(asset);
  return card;
}

function renderHome(data) {
  document.getElementById("home-date").textContent = data.header_label;
  if (data.fetched_at) {
    const t = new Date(data.fetched_at);
    const hhmm = t.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("home-refresh").textContent = `odśw. ${hhmm}`;
  }
  const widgets = document.getElementById("home-widgets");
  widgets.innerHTML = "";
  data.assets.forEach(a => widgets.appendChild(renderHomeWidget(a)));
}

/* ---------- DETAIL ---------- */
function renderVerdictBlock(asset) {
  const v = asset.verdict;
  if (!v) return null;
  const opp = (v.opp !== undefined) ? v.opp : asset.opp;
  const subCls = v.level === "okazja" ? "opp" : "";
  const rows = (v.signals || []).map(s => `
    <li>
      <span class="sig-dot ${s.tone}"></span>
      <span class="sig-label">${s.label}</span>
      <span class="sig-text">${s.text}</span>
    </li>`).join("");
  const section = document.createElement("section");
  section.className = "block";
  section.innerHTML = `
    <h3 class="section">Czy warto dziś kupić?</h3>
    <p class="section-sub">Jeden wynik okazji (zielony = kupuj) i sygnały prostym językiem: nastrój rynku, czy tanio i trend miesiąca; prognoza tygodnia w bloku niżej.</p>
    <div class="verdict-block" style="--opp-color:${scoreColor(opp)}">
      <div class="vb-price">${asset.price} · <span class="${chgClass(asset.price_change_24h)}">${fmtPct(asset.price_change_24h)}</span> 24h</div>
      <div class="verdict-row">
        <span class="verdict-opp">${opp}</span>
        <span class="verdict-word">${v.word || ""}</span>
      </div>
      <div class="verdict-sub ${subCls}">${v.sublabel || ""}</div>
      <p class="verdict-headline">${v.headline}</p>
      <div class="scale-wrap">
        <div class="scale-bar"><div class="scale-marker" style="left:clamp(8px, ${opp}%, calc(100% - 8px)); background:${scoreColor(opp)}"></div></div>
        <div class="scale-labels"><span>drogo</span><span>neutralnie</span><span>okazja</span></div>
      </div>
      <ul class="signal-list">${rows}</ul>
      <div class="verdict-foot">Zielona kropka — sprzyja zakupowi · szara — neutralna · czerwona — przemawia przeciw. Rules-based ocena okazji do zakupu — nie porada inwestycyjna i nie prognoza ceny.</div>
    </div>
  `;
  return section;
}

/* Barograf — okazja 30 dni jako linia na pasmach pogodowych (zielone=OKAZJA ≥84,
   szare=KUP 42–84, czerwone=drogo <42), a prognoza 7d to jej PRZEDŁUŻENIE w przód
   (zakreskowany stożek = niepewność, środkowa kreska = oczekiwany kierunek).
   Jeden ślad: 30 dni za tobą + 7 dni przed. Zaadoptowane z konceptu v2 (2026-06-28). */
function buildBaro(opp30, f) {
  if (!opp30 || opp30.length < 2) return "";
  const W = 360, H = 104, padL = 3, padR = 3, padT = 8, padB = 4;
  const today = opp30.length - 1, maxIdx = today + 7;
  const cl = v => Math.max(0, Math.min(100, v));
  const xF = i => padL + i * (W - padL - padR) / maxIdx;
  const yF = v => padT + (1 - cl(v) / 100) * (H - padT - padB);
  let s = `<svg viewBox="0 0 ${W} ${H}" class="fc-baro-svg" aria-hidden="true">`;
  s += `<defs><pattern id="fchatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="var(--accent)" stroke-width="1" opacity="0.55"/></pattern></defs>`;
  // pasma pogodowe (te same progi co werdykt: 42 / 84)
  s += `<rect x="0" y="${yF(100).toFixed(1)}" width="${W}" height="${(yF(84) - yF(100)).toFixed(1)}" fill="var(--c-75)" opacity="0.13"/>`;
  s += `<rect x="0" y="${yF(84).toFixed(1)}" width="${W}" height="${(yF(42) - yF(84)).toFixed(1)}" fill="var(--c-45)" opacity="0.07"/>`;
  s += `<rect x="0" y="${yF(42).toFixed(1)}" width="${W}" height="${(yF(0) - yF(42)).toFixed(1)}" fill="var(--c-30)" opacity="0.10"/>`;
  [42, 84].forEach(v => { s += `<line x1="0" y1="${yF(v).toFixed(1)}" x2="${W}" y2="${yF(v).toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 4"/>`; });
  // ślad przeszłości (30 dni)
  const pts = opp30.map((v, i) => `${xF(i).toFixed(1)},${yF(v).toFixed(1)}`).join(" ");
  s += `<polyline points="${pts}" fill="none" stroke="var(--text)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
  // separator "dziś"
  const xT = xF(today), yT = yF(opp30[today]);
  s += `<line x1="${xT.toFixed(1)}" y1="${padT}" x2="${xT.toFixed(1)}" y2="${H - padB}" stroke="var(--muted-2)" stroke-width="1" opacity="0.55"/>`;
  // stożek prognozy (przedłużenie śladu w przód)
  if (f && f.score_range) {
    const lo = f.score_range[0], hi = f.score_range[1], xE = xF(maxIdx);
    s += `<path d="M${xT.toFixed(1)},${yT.toFixed(1)} L${xE.toFixed(1)},${yF(hi).toFixed(1)} L${xE.toFixed(1)},${yF(lo).toFixed(1)} Z" fill="url(#fchatch)" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;
    const mid = (lo + hi) / 2;
    s += `<line x1="${xT.toFixed(1)}" y1="${yT.toFixed(1)}" x2="${xE.toFixed(1)}" y2="${yF(mid).toFixed(1)}" stroke="var(--muted)" stroke-width="1.3" stroke-dasharray="2 3" opacity="0.75"/>`;
  }
  s += `<circle cx="${xT.toFixed(1)}" cy="${yT.toFixed(1)}" r="2.6" fill="var(--text)"/>`;
  s += `</svg>`;
  return s;
}

function renderForecastBlock(asset) {
  const f = asset.forecast;
  if (!f) return "";
  const [lo, hi] = f.score_range;
  // Pasmo przyklejone do krawędzi skali pokazujemy jednostronnie ("≥ 85"),
  // bo "[85,100]" udawało przedział z martwym górnym końcem (audyt 2026-06-25).
  const bandTxt = f.clamped === "hi" ? `≥ ${lo}` : f.clamped === "lo" ? `≤ ${hi}` : `pasmo ${lo}–${hi}`;
  const arrow = forecastArrow(f.direction);
  const rules = (f.rules || []).map(r => {
    const cls = r.delta > 0 ? "pos" : r.delta < 0 ? "neg" : "zero";
    const sign = r.delta > 0 ? "+" : "";
    return `<li><span class="fc-rule-name">${r.name}</span><span class="fc-rule-delta ${cls}">${sign}${r.delta}</span><span class="fc-rule-note">${r.note}</span></li>`;
  }).join("");
  const base = f.score_base;
  const totalSign = f.total_delta > 0 ? "+" : "";
  return `
    <h3 class="section">Prognoza okazji · 7 dni</h3>
    <p class="section-sub">Okazja (0–100) z ostatnich 30 dni jako linia, a prognoza tygodnia to jej przedłużenie w przód — zakreskowany stożek (szerszy = mniej pewny). To prognoza okna zakupowego, nie ceny.</p>
    <div class="forecast-block">
      <div class="fc-baro">
        ${buildBaro(asset.opp_30d, f)}
        <div class="fc-baro-axis"><span>30 dni temu</span><span>dziś → +7 dni (prognoza)</span></div>
      </div>
      <div class="fc-head">
        <span class="fc-arrow">${arrow}</span>
        <span>${bandTxt}</span>
        <span class="fc-conf">pewność: ${confLabelPl(f.confidence)}</span>
      </div>
      <ul class="fc-rules">${rules}</ul>
      <div class="fc-sum">Suma reguł: ${totalSign}${f.total_delta} od bazy ${base} (baza = średnia okazji z ostatnich odświeżeń, odporna na szum 24h)</div>
      <div class="fc-disclaimer">Prognoza okazji to rule-based ekstrapolacja z widocznego setupu — nie sygnał handlowy i nie prognoza ceny. Spodziewaj się odchyleń przy szybkich zmianach rynku.</div>
    </div>
  `;
}

function renderDetailPanel(panelEl, asset) {
  panelEl.dataset.asset = asset.key;
  const verdict = renderVerdictBlock(asset);
  const forecast = document.createElement("section");
  forecast.className = "block";
  forecast.innerHTML = renderForecastBlock(asset);

  panelEl.innerHTML = "";
  if (verdict) panelEl.appendChild(verdict);
  panelEl.appendChild(forecast);
}

function renderDetail(data) {
  const panels = document.querySelectorAll(".detail-panel");
  data.assets.forEach((a, i) => {
    if (panels[i]) renderDetailPanel(panels[i], a);
  });
}

/* ---------- ROUTING + SWIPE ---------- */
const ASSETS = ["btc", "bnb"];
let activeIdx = 0;
let appData = null;

function routeFromHash() {
  const h = window.location.hash;
  if (h === "#/btc") return "btc";
  if (h === "#/bnb") return "bnb";
  return "home";
}

function setActivePanel(idx, animate=true) {
  activeIdx = idx;
  const track = document.getElementById("swipe-track");
  track.style.transition = animate ? "transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1)" : "none";
  track.style.transform = `translateX(${-idx * 50}%)`;

  if (appData && appData.assets[idx]) {
    document.getElementById("detail-name").textContent = appData.assets[idx].name;
    document.getElementById("detail-sub").textContent = appData.assets[idx].sub;
  }
}

function applyRoute(route) {
  const detail = document.getElementById("detail-view");
  if (route === "home") {
    detail.classList.add("hidden");
    document.body.classList.remove("sheet-open");
  } else {
    detail.classList.remove("hidden");
    document.body.classList.add("sheet-open");
    setActivePanel(ASSETS.indexOf(route), false);
    detail.scrollTo({ top: 0 });
  }
}

function navigate(route) {
  if (route === "home") {
    if (window.location.hash !== "" && window.location.hash !== "#/") {
      window.location.hash = "#/";
    } else {
      applyRoute("home");
    }
  } else {
    window.location.hash = `#/${route}`;
  }
}

function navigateDetail(idx) {
  setActivePanel(idx, true);
  const newHash = `#/${ASSETS[idx]}`;
  if (window.location.hash !== newHash) {
    history.replaceState(null, "", newHash);
  }
}

window.addEventListener("hashchange", () => {
  applyRoute(routeFromHash());
});

/* Swipe gestures */
function attachSwipe() {
  const container = document.getElementById("swipe-container");
  const track = document.getElementById("swipe-track");
  let startX = 0, startY = 0, lastX = 0, dragging = false, locked = null;

  container.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    lastX = startX;
    dragging = true;
    locked = null;
    track.style.transition = "none";
  }, { passive: true });

  container.addEventListener("touchmove", e => {
    if (!dragging) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    const dy = y - startY;
    if (locked === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
      }
    }
    if (locked === "x") {
      e.preventDefault();
      lastX = x;
      const w = container.offsetWidth;
      const dragPct = (dx / w) * 50;
      let target = -activeIdx * 50 + dragPct;
      if (target > 0) target = target / 3;
      if (target < -50) target = -50 + (target + 50) / 3;
      track.style.transform = `translateX(${target}%)`;
    }
  }, { passive: false });

  container.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    if (locked !== "x") { locked = null; return; }
    const dx = lastX - startX;
    const threshold = container.offsetWidth * 0.2;
    let targetIdx = activeIdx;
    if (dx < -threshold && activeIdx < ASSETS.length - 1) targetIdx = activeIdx + 1;
    else if (dx > threshold && activeIdx > 0) targetIdx = activeIdx - 1;
    navigateDetail(targetIdx);
    locked = null;
  });

  container.addEventListener("touchcancel", () => {
    if (!dragging) return;
    dragging = false;
    locked = null;
    setActivePanel(activeIdx, true);
  });
}

/* Swipe-down-to-dismiss na nagłówku arkusza — grabber afordancja iOS (audyt
   2026-06-25). Pionowy gest tylko na .sheet-header, więc nie koliduje z
   poziomym pagerem (w .sheet-content) ani ze scrollem treści. */
function attachSheetDismiss() {
  const sheet = document.getElementById("detail-view");
  const header = document.getElementById("sheet-header");
  let startY = 0, dy = 0, dragging = false;

  header.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    dy = 0; dragging = true;
    sheet.style.transition = "none";
  }, { passive: true });

  header.addEventListener("touchmove", e => {
    if (!dragging) return;
    dy = e.touches[0].clientY - startY;
    if (dy < 0) dy = dy / 4;            // opór przy ciągnięciu w górę
    sheet.style.transform = `translateY(${dy}px)`;
  }, { passive: true });

  function release() {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = "";        // przywróć CSS (snap z powrotem / slide-down)
    sheet.style.transform = "";         // oddaj kontrolę CSS-owi
    if (dy > 90) navigate("home");      // próg zamknięcia
  }
  header.addEventListener("touchend", release, { passive: true });
  header.addEventListener("touchcancel", release, { passive: true });
}

/* Keyboard arrows on detail */
document.addEventListener("keydown", e => {
  if (routeFromHash() === "home") return;
  if (e.key === "ArrowLeft" && activeIdx > 0) {
    navigateDetail(activeIdx - 1);
  } else if (e.key === "ArrowRight" && activeIdx < ASSETS.length - 1) {
    navigateDetail(activeIdx + 1);
  } else if (e.key === "Escape") {
    navigate("home");
  }
});

/* Back chevron + backdrop tap → close sheet */
document.getElementById("back-btn").addEventListener("click", () => navigate("home"));
document.getElementById("sheet-backdrop").addEventListener("click", () => navigate("home"));

/* Bootstrap */
fetch("data.json?_t=" + Date.now())
  .then(r => r.json())
  .then(data => {
    appData = data;
    renderHome(data);
    renderDetail(data);
    attachSwipe();
    attachSheetDismiss();
    applyRoute(routeFromHash());
  })
  .catch(err => {
    console.error("Failed to load data.json:", err);
    const dateEl = document.getElementById("home-date");
    if (dateEl) dateEl.textContent = "—";
    document.getElementById("home-widgets").innerHTML = `
      <div class="asset-card" style="text-align:center; color:var(--muted); cursor:default;">
        Nie udało się załadować danych rynku.
        <div style="margin-top:14px;">
          <button onclick="location.reload()" style="color:var(--accent); font-size:13px; font-weight:600;">Spróbuj ponownie</button>
        </div>
      </div>`;
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoBeacon — BTC / BNB</title>
<link rel="icon" type="image/svg+xml" href="logo/cryptobeacon-monogram.svg">
<style>
  :root {
    --bg:        #0d1117;
    --bg-soft:   #11161f;
    --panel:     #161c27;
    --panel-2:   #1c2330;
    --border:    #232b3a;
    --text:      #e6e9ef;
    --muted:     #8a93a6;
    --muted-2:   #6b7385;
    --accent:    #c4a878;

    --c-0:   #dc2626;
    --c-15:  #ef4444;
    --c-30:  #f97316;
    --c-45:  #9ca3af;
    --c-55:  #84cc16;
    --c-65:  #4ade80;
    --c-75:  #22c55e;
    --c-85:  #16a34a;
    --c-100: #15803d;
    --pos: #22c55e;
    --neg: #ef4444;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    background-image:
      radial-gradient(1200px 600px at 20% -10%, rgba(196,168,120,0.04), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(63,93,98,0.06), transparent 60%);
    color: var(--text);
    font-family: "Helvetica Neue", "Helvetica", "Arial", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px; line-height: 1.55;
    min-height: 100vh;
    overscroll-behavior-x: none;
  }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }
  .view.hidden { display: none; }

  header.top { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 48px; flex-wrap: wrap; }
  header.top .brand { display: flex; align-items: center; color: #ffffff; }
  header.top .brand .brand-logo { height: 34px; width: auto; display: block; }
  header.top .date-block { text-align: right; line-height: 1.3; }
  header.top .date { color: var(--muted); font-size: 13px; }
  header.top .date-refresh { color: var(--muted-2); font-size: 11px; margin-top: 2px; letter-spacing: 0.02em; }

  /* HOME — widgety BTC + BNB stackowane, każdy 2 kolumny (score + DCA) połączone hairline */
  .widgets { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
  .asset-card {
    width: 100%; text-align: left;
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden;
    transition: background 120ms, border-color 120ms, transform 120ms ease;
  }
  button.asset-card:hover { background: var(--panel-2); border-color: #2f384a; }
  button.asset-card:active { transform: scale(0.997); }
  /* Static widget on detail pages — no hover/press, just visual */
  div.asset-card { margin-bottom: 18px; cursor: default; }
  .asset-card .score-pane { border-right: 1px solid var(--border); }
  .asset-card .pane { padding: 22px 24px; display: flex; flex-direction: column; }
  .asset-card .pane-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 14px;
  }
  .asset-card .pane-head .asset-name-strong { color: var(--text); font-size: 13px; letter-spacing: 0.08em; }

  .asset-card .score-pane .score-row { display: flex; align-items: baseline; gap: 18px; }
  .asset-card .score-pane .asset-score { font-size: 60px; font-weight: 700; line-height: 0.95; color: var(--cell-color); letter-spacing: -0.02em; }
  .asset-card .score-pane .asset-trend { font-size: 22px; font-weight: 700; color: var(--cell-color); }
  .asset-card .score-pane .asset-spark { display: block; width: 100%; height: 36px; margin-top: 12px; opacity: 0.9; }
  .asset-card .score-pane .asset-spark polyline { stroke: var(--cell-color); stroke-width: 2; fill: none; }
  .asset-card .score-pane .asset-spark .dot { fill: var(--cell-color); }
  .asset-card .score-pane .asset-mood { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 14px; }
  .asset-card .score-pane .forecast-badge {
    font-size: 11px; color: var(--muted); margin-top: 6px;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.02em; flex-wrap: wrap;
  }
  .asset-card .score-pane .forecast-badge .arrow { font-size: 13px; font-weight: 700; color: var(--cell-color); }
  .asset-card .score-pane .forecast-badge .range { color: var(--text); font-weight: 500; }
  .asset-card .score-pane .forecast-badge .conf { color: var(--muted-2); }
  .asset-card .score-pane .forecast-badge .badge-prefix,
  .asset-card .score-pane .forecast-badge .badge-sep { color: var(--muted-2); }
  .asset-card .score-pane .asset-price-row {
    display: flex; align-items: baseline; gap: 12px;
    margin-top: auto; padding-top: 14px;
  }
  .asset-card .score-pane .asset-price { font-size: 16px; font-weight: 600; color: var(--text); }
  .asset-card .score-pane .asset-price-change { font-size: 12px; font-weight: 600; }
  .asset-card .score-pane .asset-price-change.up { color: var(--pos); }
  .asset-card .score-pane .asset-price-change.down { color: var(--neg); }
  .asset-card .score-pane .asset-price-change.flat { color: var(--muted-2); }

  .asset-card .dca-pane .dca-two-col {
    display: grid; grid-template-columns: 1fr 0.7fr; gap: 14px; margin-bottom: 18px;
    align-items: end;
  }
  .asset-card .dca-pane .dca-col { display: flex; flex-direction: column; gap: 6px; }
  .asset-card .dca-pane .dca-col-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-2);
  }
  .asset-card .dca-pane .dca-value { font-size: 36px; font-weight: 700; line-height: 1; color: var(--pos); letter-spacing: -0.01em; }
  .asset-card .dca-pane .dca-value.no { color: var(--neg); }
  .asset-card .dca-pane .dca-col:nth-child(2) .dca-value { font-size: 25px; }
  .asset-card .dca-pane .dca-col:nth-child(2) .dca-col-label { font-size: 9px; }
  .asset-card .dca-pane .dca-history-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted-2); margin-top: auto; margin-bottom: 8px;
  }
  .asset-card .dca-pane .dca-strip { display: flex; gap: 2px; height: 14px; margin-bottom: 8px; }
  .asset-card .dca-pane .dca-strip .day { flex: 1; border-radius: 1.5px; }
  .asset-card .dca-pane .dca-strip .day.yes { background: var(--pos); }
  .asset-card .dca-pane .dca-strip .day.no { background: var(--neg); }
  .asset-card .dca-pane .dca-history-summary { font-size: 11px; color: var(--muted); }
  .asset-card .dca-pane .dca-history-summary strong { color: var(--text); font-weight: 600; }

  /* Hero narrative */
  .hero-narrative {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 24px;
  }
  .hero-narrative .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 8px; }
  .hero-narrative p { margin: 0; font-size: 14.5px; color: #c8cdd9; line-height: 1.6; }
  .hero-narrative p strong { color: #fff; font-weight: 600; }
  .coin-btc { color: #f7931a; font-weight: 600; }
  .coin-bnb { color: #f0b90b; font-weight: 600; }

  /* DETAIL VIEW */
  .detail-top { margin-bottom: 18px; }
  .detail-top .back {
    font-size: 22px; color: var(--text); width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .detail-top .back:hover { background: var(--panel); }
  .detail-top .asset-title { display: flex; align-items: baseline; gap: 8px; font-size: 15px; font-weight: 600; }
  .detail-top .asset-title .muted { color: var(--muted); font-weight: 400; font-size: 13px; }
  .detail-top .dots { display: flex; gap: 6px; }
  .detail-top .dots .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); cursor: pointer; transition: background 120ms;
  }
  .detail-top .dots .dot:hover { background: var(--muted-2); }
  .detail-top .dots .dot.active { background: var(--text); }

  .swipe-container { overflow: hidden; touch-action: pan-y; user-select: none; }
  .swipe-track {
    display: flex; width: 200%;
    transform: translateX(0);
    will-change: transform;
  }
  .detail-panel { width: 50%; flex-shrink: 0; padding-right: 12px; }
  .detail-panel:last-child { padding-right: 0; padding-left: 12px; }

  .detail-narrative {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 22px; margin-bottom: 24px;
  }
  .detail-narrative p { margin: 0; font-size: 14px; color: #c8cdd9; line-height: 1.6; }
  .detail-narrative p strong { color: #fff; font-weight: 600; }

  h3.section {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); font-weight: 600; margin: 0 0 4px;
  }
  .section-sub {
    font-size: 12.5px; color: var(--muted-2);
    margin: 0 0 14px; max-width: 72ch; line-height: 1.5;
  }
  section.block { margin-bottom: 24px; }

  /* Time strip */
  .strip.time { display: grid; gap: 8px; grid-template-columns: repeat(5, 1fr); }
  .cell {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 12px;
  }
  .cell .cell-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 8px; white-space: nowrap; }
  .cell .cell-score-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  .cell .cell-trend { font-size: 14px; font-weight: 700; line-height: 1; color: var(--cell-color); }
  .cell .cell-score { font-size: 26px; font-weight: 700; line-height: 1; color: var(--cell-color); }
  .cell .cell-spark { display: block; width: 100%; height: 18px; margin-bottom: 8px; opacity: 0.85; }
  .cell .cell-spark polyline { stroke: var(--cell-color); stroke-width: 1.5; fill: none; }
  .cell .cell-spark .dot { fill: var(--cell-color); }
  .cell .cell-mood { font-size: 11px; color: var(--text); opacity: 0.9; min-height: 32px; }

  /* Stats */
  .stats-grid { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }
  .stat .stat-value { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -0.01em; }
  .stat .stat-change { font-size: 12px; font-weight: 600; margin-top: 6px; }
  .stat .stat-change.up { color: #4ade80; }
  .stat .stat-change.down { color: #f87171; }
  .stat .stat-change.flat { color: var(--muted-2); }
  .stat-changes { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
  .stat-tf-row { display: flex; justify-content: space-between; gap: 8px; }
  .stat-tf { color: var(--muted-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
  .stat-tf-val { font-weight: 600; font-size: 12px; }
  .stat-tf-val.up { color: #4ade80; }
  .stat-tf-val.down { color: #f87171; }
  .stat-tf-val.flat { color: var(--muted-2); }

  /* Forecast block (detail page) — uproszczone: 1 linia + DCA tip */
  .forecast-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 20px;
  }
  .forecast-block .fc-line {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; color: var(--text); font-weight: 500;
    letter-spacing: -0.01em;
  }
  .forecast-block .fc-line .fc-arrow {
    font-size: 22px; color: var(--cell-color); font-weight: 700; line-height: 1;
  }
  .forecast-block .fc-tip {
    margin-top: 10px; font-size: 13px;
    color: var(--muted); line-height: 1.5;
  }

  /* Events / Wydarzenia (etap 4) */
  .events-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 4px 20px;
  }
  .events-list { list-style: none; padding: 0; margin: 0; }
  .events-list li {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .events-list li:last-child { border-bottom: none; }
  .ev-meta {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    margin-bottom: 6px; font-size: 11px; color: var(--muted-2);
  }
  .ev-when { color: var(--muted-2); }
  .ev-tag {
    font-size: 9px; padding: 2px 7px; border-radius: 4px;
    background: var(--panel-2); color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  .ev-tag.ev-tag-binance { color: #f0b90b; background: rgba(240, 185, 11, 0.12); }
  .ev-tag.ev-tag-regulacje { color: #ef4444; background: rgba(239, 68, 68, 0.12); }
  .ev-tag.ev-tag-makro { color: #4ade80; background: rgba(74, 222, 128, 0.12); }
  .ev-tag.ev-tag-onchain { color: #c4a878; background: rgba(196, 168, 120, 0.12); }
  .ev-title {
    display: block;
    color: var(--text); font-size: 14px; font-weight: 500;
    text-decoration: none; line-height: 1.4;
    transition: opacity 120ms;
  }
  .ev-title:hover { opacity: 0.7; }
  .ev-source { font-size: 11px; color: var(--muted-2); margin-top: 4px; }
  .events-empty {
    padding: 18px 0; text-align: center;
    font-size: 12px; color: var(--muted-2); font-style: italic;
  }

  /* On-chain block (etap 3) */
  .onchain-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 20px;
  }
  .onchain-block .oc-flow {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
  }
  .onchain-block .oc-flow .oc-label { font-size: 13px; font-weight: 500; color: var(--muted); }
  .onchain-block .oc-flow .oc-value.inflow { color: var(--neg); }
  .onchain-block .oc-flow .oc-value.outflow { color: var(--pos); }
  .onchain-block .oc-flow .oc-value.flat { color: var(--text); }
  .onchain-block .oc-signal { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.5; }
  .onchain-block .oc-pending { font-size: 12px; color: var(--muted-2); font-style: italic; }

  footer {
    margin-top: 36px; padding-top: 22px; border-top: 1px solid var(--border);
    color: var(--muted-2); font-size: 11px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .legend { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .legend .swatch { display: inline-block; width: 26px; height: 12px; border-radius: 2px; }
  .legend .lbl { color: var(--muted-2); font-size: 10px; margin: 0 4px; }
  .copyright { width: 100%; text-align: center; padding-top: 18px; margin-top: 14px; border-top: 1px solid var(--border); color: var(--muted-2); font-size: 11px; }

  /* ===== iOS-NATIVE MODAL SHEET (per Apple HIG) ===== */

  /* Sheet pokazuje peek 10pt parent view — iOS 17+ pattern */
  #detail-view {
    position: fixed; top: 10px; left: 0; right: 0; bottom: 0;
    overflow-y: auto; overflow-x: hidden;
    background: var(--panel);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    transform: translateY(calc(100% + 10px));
    /* iOS spring-style ease */
    transition: transform 460ms cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 150;
    will-change: transform;
    -webkit-overflow-scrolling: touch;
    /* Soft shadow above (depth) — iOS sheets nie mają hard shadow */
    box-shadow: 0 -1px 0 rgba(255,255,255,0.04), 0 -16px 40px rgba(0, 0, 0, 0.45);
  }
  #detail-view.hidden { display: block !important; pointer-events: none; }
  #detail-view:not(.hidden) { transform: translateY(0); pointer-events: auto; }

  /* Backdrop — iOS uses ~rgba(0,0,0,0.4) for sheet dim */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 400ms ease;
    z-index: 140;
  }
  body.sheet-open .sheet-backdrop { opacity: 1; pointer-events: auto; }
  body.sheet-open #home-view {
    transform: scale(0.94);
    border-radius: 12px;
    transition: transform 460ms cubic-bezier(0.32, 0.72, 0, 1), border-radius 460ms ease;
    transform-origin: top center;
    overflow: hidden;
  }

  /* Sheet header — iOS Material: thin blur + saturate (Liquid Glass-y) */
  .sheet-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(28, 35, 48, 0.72);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }

  /* Grabber — 36×5pt, ~50% alpha, 5pt from top per HIG */
  .sheet-handle {
    width: 36px; height: 5px; border-radius: 2.5px;
    background: rgba(255, 255, 255, 0.45);
    margin: 5px auto 0;
  }

  /* Nav bar — 44pt height (HIG touch target) */
  .sheet-nav {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
    padding: 6px 8px 8px;
    min-height: 44px;
  }

  /* iOS-native close button (X) — circle pill w prawym górnym rogu */
  .sheet-close-x {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    justify-self: end;
    background: transparent;
    transition: opacity 120ms;
  }
  .sheet-close-x:active { opacity: 0.55; }
  .sheet-close-x .x-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.75);
    font-size: 13px; font-weight: 700;
    line-height: 1;
    transition: background 120ms;
  }
  .sheet-close-x:hover .x-mark { background: rgba(255, 255, 255, 0.2); }

  /* iOS bar title — 17pt semibold, optional caption pod (Stocks-style) */
  .asset-title {
    text-align: center; display: flex; flex-direction: column;
    align-items: center; line-height: 1.1; justify-self: center;
  }
  .asset-title-name {
    font-size: 17px; font-weight: 600; color: var(--text);
    letter-spacing: -0.02em;
  }
  .asset-title-sub {
    font-size: 11px; color: var(--muted); font-weight: 400;
    margin-top: 1px; letter-spacing: 0.01em;
  }
  .nav-spacer { width: 44px; justify-self: start; }

  .sheet-content { padding: 18px 24px 40px; }

  @media (max-width: 600px) {
    .wrap { padding: 24px 12px 60px; }
    header.top { margin-bottom: 26px; gap: 12px; }
    header.top .brand .brand-logo { height: 29px; }
    header.top .date { font-size: 12px; }
    .widgets { gap: 10px; margin-bottom: 14px; }

    /* Compact widget: side-by-side, very tight */
    .asset-card { grid-template-columns: 1fr 1fr; }
    .asset-card .score-pane { border-right: 1px solid var(--border); border-bottom: none; }
    .asset-card .pane { padding: 12px 12px; }
    .asset-card .pane-head { font-size: 9px; margin-bottom: 8px; letter-spacing: 0.1em; }

    /* Score pane compact */
    .asset-card .score-pane .asset-score { font-size: 36px; }
    .asset-card .score-pane .asset-trend { font-size: 14px; }
    .asset-card .score-pane .asset-spark { height: 22px; margin-top: 6px; }
    .asset-card .score-pane .asset-mood { font-size: 12px; margin-top: 8px; }
    .asset-card .score-pane .forecast-badge {
      font-size: 9px; margin-top: 4px; gap: 4px;
    }
    .asset-card .score-pane .forecast-badge .arrow { font-size: 11px; }
    .asset-card .score-pane .forecast-badge .badge-prefix,
    .asset-card .score-pane .forecast-badge .badge-sep,
    .asset-card .score-pane .forecast-badge .conf { display: none; }
    .asset-card .score-pane .asset-price-row { padding-top: 8px; }
    .asset-card .score-pane .asset-price { font-size: 12px; }
    .asset-card .score-pane .asset-price-change { font-size: 10px; }

    /* DCA pane: side-by-side, "Za 7 dni" 30% mniejsze (1fr : 0.7fr) */
    .asset-card .dca-pane .dca-two-col {
      grid-template-columns: 1fr 0.7fr;
      gap: 8px; margin-bottom: 10px;
    }
    .asset-card .dca-pane .dca-value { font-size: 22px; }
    .asset-card .dca-pane .dca-col:nth-child(2) .dca-value { font-size: 15px; }
    .asset-card .dca-pane .dca-col-label { font-size: 9px; }
    .asset-card .dca-pane .dca-col:nth-child(2) .dca-col-label { font-size: 8px; }
    .asset-card .dca-pane .dca-strip { height: 8px; margin-bottom: 6px; }
    .asset-card .dca-pane .dca-history-label { font-size: 9px; margin-bottom: 4px; }
    .asset-card .dca-pane .dca-history-summary { font-size: 10px; }

    /* Detail page mobile */
    .strip.time { grid-template-columns: repeat(2, 1fr); }
    .stats-grid { grid-template-columns: 1fr; }
    .detail-panel { padding-right: 6px; }
    .detail-panel:last-child { padding-left: 6px; }
    .sheet-content { padding: 14px 16px 32px; }
    .sheet-nav { padding: 4px 12px 10px; }
  }

  /* Very narrow phones (<380px): fallback to stack */
  @media (max-width: 380px) {
    .asset-card { grid-template-columns: 1fr; }
    .asset-card .score-pane { border-right: none; border-bottom: 1px solid var(--border); }
    .asset-card .dca-pane .dca-two-col { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<script>
function scoreColor(s){
  if (s<15)  return "var(--c-0)";
  if (s<30)  return "var(--c-15)";
  if (s<45)  return "var(--c-30)";
  if (s<55)  return "var(--c-45)";
  if (s<65)  return "var(--c-55)";
  if (s<75)  return "var(--c-65)";
  if (s<85)  return "var(--c-75)";
  if (s<95)  return "var(--c-85)";
  return "var(--c-100)";
}

function deltaPill(delta) {
  if (delta === 0 || delta === null || delta === undefined) return null;
  if (delta > 0) return { cls:"up",   text:`↑ ${delta}` };
  return                 { cls:"down", text:`↓ ${Math.abs(delta)}` };
}

function trendSpanHtml(delta, cls="cell-trend") {
  const d = deltaPill(delta);
  return d ? `<span class="${cls} ${d.cls}">${d.text}</span>` : "";
}

function sparklineSvg(values, w=100, h=22, cls="cell-spark") {
  if (!values || values.length < 2) return "";
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = (max - min) || 1;
  const pad = 2;
  const usableH = h - pad * 2;
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = pad + (1 - (v - min) / range) * usableH;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const lastX = w;
  const lastY = pad + (1 - (values[values.length-1] - min) / range) * usableH;
  return `<svg class="${cls}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points}" />
    <circle class="dot" cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="1.8" />
  </svg>`;
}

function pctChangeClass(v) {
  if (v > 0) return "up";
  if (v < 0) return "down";
  return "flat";
}
function fmtPct(v) {
  const sign = v > 0 ? "+" : "";
  const valStr = (typeof v === "number") ? String(v).replace(".", ",") : v;
  return `${sign}${valStr}%`;
}

/* ---------- ASSET WIDGET (used on home and at top of each detail page) ---------- */
function forecastArrow(direction) {
  if (direction === "up") return "↗";
  if (direction === "down") return "↘";
  return "→";
}
function confLabelPl(c) {
  if (c === "high") return "wysoka";
  if (c === "medium") return "średnia";
  return "niska";
}

function forecastBadgeHtml(forecast) {
  if (!forecast) return "";
  const [lo, hi] = forecast.score_range;
  const midColor = scoreColor(Math.round((lo + hi) / 2));
  return `
    <div class="forecast-badge" style="--cell-color:${midColor}">
      <span class="arrow">${forecastArrow(forecast.direction)}</span>
      <span class="badge-prefix">za 7d:</span>
      <span class="range">${lo}–${hi}</span>
      <span class="badge-sep">·</span>
      <span class="conf">${confLabelPl(forecast.confidence)}</span>
    </div>
  `;
}

function dcaIn7d(asset) {
  if (!asset.forecast) return null;
  return asset.forecast.score_expected >= 80 ? "NIE" : "TAK";
}

function assetCardInnerHtml(asset) {
  const pctCls = pctChangeClass(asset.price_change_24h);
  const dca = asset.dca || { decision: "—", history: [] };
  const yes = dca.history.filter(v => v === 1).length;
  const no = dca.history.length - yes;
  const days = dca.history.map(v => `<span class="day ${v ? 'yes' : 'no'}"></span>`).join("");
  const dca7d = dcaIn7d(asset);
  const dca7dCol = dca7d ? `
    <div class="dca-col">
      <div class="dca-col-label">Za 7 dni</div>
      <div class="dca-value ${dca7d === 'TAK' ? '' : 'no'}">${dca7d}</div>
    </div>` : "";
  const priceHtml = asset.price ? `
      <div class="asset-price-row">
        <span class="asset-price">${asset.price}</span>
        ${asset.price_change_24h !== undefined ? `<span class="asset-price-change ${pctCls}">${fmtPct(asset.price_change_24h)} 24h</span>` : ""}
      </div>` : "";
  return `
    <div class="pane score-pane">
      <div class="pane-head">
        <span class="asset-name-strong">${asset.name}</span> · ${asset.sub}
      </div>
      <div class="score-row">
        <div class="asset-score">${asset.score}</div>
        ${trendSpanHtml(asset.delta, "asset-trend")}
      </div>
      ${sparklineSvg(asset.history, 300, 36, "asset-spark")}
      <div class="asset-mood">${asset.mood}</div>
      ${forecastBadgeHtml(asset.forecast)}
      ${priceHtml}
    </div>
    <div class="pane dca-pane">
      <div class="pane-head">Kupić ${asset.name}?</div>
      <div class="dca-two-col">
        <div class="dca-col">
          <div class="dca-col-label">Dziś</div>
          <div class="dca-value ${dca.decision === 'TAK' ? '' : 'no'}">${dca.decision}</div>
        </div>
        ${dca7dCol}
      </div>
      <div class="dca-history-label">Ostatnie 30 dni</div>
      <div class="dca-strip">${days}</div>
      <div class="dca-history-summary"><strong>${yes}</strong> dni TAK · <strong>${no}</strong> NIE</div>
    </div>
  `;
}

function renderHomeWidget(asset) {
  const card = document.createElement("button");
  card.className = "asset-card";
  card.dataset.asset = asset.key;
  card.style.setProperty("--cell-color", scoreColor(asset.score));
  card.addEventListener("click", () => navigate(asset.key));
  card.innerHTML = assetCardInnerHtml(asset);
  return card;
}

function renderDetailWidget(asset) {
  const card = document.createElement("div");
  card.className = "asset-card";
  card.style.setProperty("--cell-color", scoreColor(asset.score));
  card.innerHTML = assetCardInnerHtml(asset);
  return card;
}

function renderHome(data) {
  document.getElementById("home-date").textContent = data.header_label;
  if (data.fetched_at) {
    const t = new Date(data.fetched_at);
    const hhmm = t.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("home-refresh").textContent = `odśw. ${hhmm}`;
  }
  document.getElementById("home-narrative").innerHTML = data.narrative;
  const widgets = document.getElementById("home-widgets");
  widgets.innerHTML = "";
  data.assets.forEach(a => widgets.appendChild(renderHomeWidget(a)));
}

/* ---------- DETAIL ---------- */
function renderTimeCell(item) {
  const div = document.createElement("div");
  div.className = "cell";
  div.style.setProperty("--cell-color", scoreColor(item.score));
  div.innerHTML = `
    <div class="cell-name">${item.name}${item.sub ? ` · ${item.sub}` : ""}</div>
    <div class="cell-score-row">
      <div class="cell-score">${item.score}</div>
      ${trendSpanHtml(item.delta)}
    </div>
    ${sparklineSvg(item.history)}
    <div class="cell-mood">${item.mood}</div>
  `;
  return div;
}

function renderStat(s) {
  const stat = document.createElement("div");
  stat.className = "stat";
  let changeHtml = "";
  if (Array.isArray(s.changes)) {
    const rows = s.changes.map(c => {
      const cls = pctChangeClass(c.val);
      return `<div class="stat-tf-row"><span class="stat-tf">${c.tf}</span><span class="stat-tf-val ${cls}">${fmtPct(c.val)}</span></div>`;
    }).join("");
    changeHtml = `<div class="stat-changes">${rows}</div>`;
  } else if (s.change !== null && s.change !== undefined) {
    const cls = pctChangeClass(s.change);
    const unit = s.changeUnit || "%";
    const valStr = (typeof s.change === "number") ? String(s.change).replace(".", ",") : s.change;
    const sign = s.change > 0 ? "+" : "";
    changeHtml = `<div class="stat-change ${cls}">${sign}${valStr} ${unit}</div>`;
  }
  stat.innerHTML = `
    <div class="stat-label">${s.label}</div>
    <div class="stat-value">${s.value}</div>
    ${changeHtml}
  `;
  return stat;
}

function formatRelativeTime(iso) {
  const date = new Date(iso);
  const now = new Date();
  const diffMin = Math.max(0, Math.floor((now - date) / 60000));
  if (diffMin < 1) return "teraz";
  if (diffMin < 60) return `${diffMin} min temu`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h temu`;
  const diffDay = Math.floor(diffHr / 24);
  return `${diffDay}d temu`;
}

function tagClass(tag) {
  return "ev-tag-" + tag.toLowerCase().replace("-", "");
}

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderEventsBlock(asset, allEvents) {
  if (!allEvents || allEvents.length === 0) return "";
  const events = allEvents.filter(e => (e.assets || []).includes(asset.key)).slice(0, 6);
  let inner;
  if (events.length === 0) {
    inner = `<div class="events-empty">Brak istotnych wydarzeń dla ${asset.name} w ostatnich 24h.</div>`;
  } else {
    inner = `<ul class="events-list">` + events.map(e => {
      const tagsHtml = (e.tags || []).map(t =>
        `<span class="ev-tag ${tagClass(t)}">${t}</span>`
      ).join("");
      return `
        <li>
          <div class="ev-meta">
            <span class="ev-when">${formatRelativeTime(e.published_at)}</span>
            ${tagsHtml}
          </div>
          <a class="ev-title" href="${e.url}" target="_blank" rel="noopener">${escapeHtml(e.title)}</a>
          <div class="ev-source">${e.source}</div>
        </li>
      `;
    }).join("") + `</ul>`;
  }
  return `
    <h3 class="section">Wydarzenia · ostatnie 24h</h3>
    <p class="section-sub">Top nagłówki z CoinDesk, CoinTelegraph i Binance, filtrowane pod ${asset.name}.</p>
    <div class="events-block">${inner}</div>
  `;
}

function renderOnchainBlock(asset) {
  const oc = asset.onchain;
  if (!oc) return "";
  if (!oc.available) {
    return `
      <h3 class="section">On-chain · Binance</h3>
      <div class="onchain-block"><div class="oc-pending">${oc.note || "Brak danych on-chain."}</div></div>
    `;
  }
  let net, cls;
  if (asset.key === "btc") {
    net = oc.net_btc;
    cls = net > 50 ? "inflow" : net < -50 ? "outflow" : "flat";
  } else {
    net = oc.net_bnb;
    cls = net > 2000 ? "inflow" : net < -2000 ? "outflow" : "flat";
  }
  const sign = net > 0 ? "+" : "";
  const unit = asset.key === "btc" ? "BTC" : "BNB";
  const netStr = (sign + net.toLocaleString("pl-PL")).replace(/,/g, " ");
  return `
    <h3 class="section">On-chain · ostatnie ${oc.window_h}h</h3>
    <p class="section-sub">Net flow ${asset.name} na/z portfeli Binance (publiczne adresy, mempool.space / BSC RPC).</p>
    <div class="onchain-block">
      <div class="oc-flow">
        <span class="oc-label">Net flow → Binance:</span>
        <span class="oc-value ${cls}">${netStr} ${unit}</span>
      </div>
      <div class="oc-signal">${oc.signal}</div>
    </div>
  `;
}

function renderForecastBlock(asset) {
  const f = asset.forecast;
  if (!f) return "";
  const [lo, hi] = f.score_range;
  const midColor = scoreColor(Math.round((lo + hi) / 2));
  const arrow = forecastArrow(f.direction);

  let headline, dcaTip;
  if (f.direction === "up") {
    headline = "Sentyment wzmacnia się w tygodniu";
    dcaTip = hi >= 75 ? "Rynek się grzeje — DCA dziś OK, ale następne tygodnie mogą być droższe." : "DCA dziś OK, jutro też prawdopodobnie dobra okazja.";
  } else if (f.direction === "down") {
    headline = "Sentyment cofa się w tygodniu";
    dcaTip = "DCA dziś OK — możesz też poczekać, prawdopodobnie wkrótce taniej.";
  } else {
    headline = "Sentyment stabilny w tygodniu";
    dcaTip = "DCA dziś bezpieczny — sytuacja bez większych zmian.";
  }
  if (f.confidence === "low") {
    dcaTip += " (sygnał chwiejny)";
  }

  return `
    <h3 class="section">Za 7 dni</h3>
    <div class="forecast-block" style="--cell-color:${midColor}">
      <div class="fc-line">
        <span class="fc-arrow">${arrow}</span>
        <span class="fc-text">${headline}</span>
      </div>
      <div class="fc-tip">${dcaTip}</div>
    </div>
  `;
}

function renderDetailPanel(panelEl, asset, allEvents) {
  panelEl.dataset.asset = asset.key;

  // Widget (same as home: score + DCA hairline-joined)
  const widget = renderDetailWidget(asset);

  // Narrative
  const narr = document.createElement("section");
  narr.className = "detail-narrative";
  narr.innerHTML = `<p>${asset.narrative || "Czekam na świeże dane z najbliższego odświeżenia."}</p>`;

  // Time strip
  const timeBlock = document.createElement("section");
  timeBlock.className = "block";
  timeBlock.innerHTML = `
    <h3 class="section">Sentyment w czasie</h3>
    <p class="section-sub">Jak nastrój ${asset.name} zmienia się w różnych horyzontach — od ostatnich 24h po cykl od halvingu.</p>
    <div class="strip time"></div>
  `;
  const strip = timeBlock.querySelector(".strip.time");
  (asset.time || []).forEach(t => strip.appendChild(renderTimeCell(t)));

  // Metryki
  const metrics = document.createElement("section");
  metrics.className = "block";
  metrics.innerHTML = `
    <h3 class="section">Metryki</h3>
    <div class="stats-grid"></div>
  `;
  const statsGrid = metrics.querySelector(".stats-grid");
  asset.stats.forEach(s => statsGrid.appendChild(renderStat(s)));

  // Forecast 7d
  const forecast = document.createElement("section");
  forecast.className = "block";
  forecast.innerHTML = renderForecastBlock(asset);

  // On-chain (etap 3)
  const onchain = document.createElement("section");
  onchain.className = "block";
  onchain.innerHTML = renderOnchainBlock(asset);

  // Events / Wydarzenia (etap 4)
  const events = document.createElement("section");
  events.className = "block";
  events.innerHTML = renderEventsBlock(asset, allEvents);

  panelEl.innerHTML = "";
  panelEl.appendChild(widget);
  panelEl.appendChild(narr);
  panelEl.appendChild(timeBlock);
  panelEl.appendChild(metrics);
  panelEl.appendChild(forecast);
  panelEl.appendChild(onchain);
  panelEl.appendChild(events);
}

function renderDetail(data) {
  const panels = document.querySelectorAll(".detail-panel");
  const events = data.events || [];
  data.assets.forEach((a, i) => {
    if (panels[i]) renderDetailPanel(panels[i], a, events);
  });
}

/* ---------- ROUTING + SWIPE ---------- */
const ASSETS = ["btc", "bnb"];
let activeIdx = 0;
let appData = null;

function routeFromHash() {
  const h = window.location.hash;
  if (h === "#/btc") return "btc";
  if (h === "#/bnb") return "bnb";
  return "home";
}

function setActivePanel(idx, animate=true) {
  activeIdx = idx;
  const track = document.getElementById("swipe-track");
  track.style.transition = animate ? "transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1)" : "none";
  track.style.transform = `translateX(${-idx * 50}%)`;

  if (appData && appData.assets[idx]) {
    document.getElementById("detail-name").textContent = appData.assets[idx].name;
    document.getElementById("detail-sub").textContent = appData.assets[idx].sub;
  }
}

function applyRoute(route) {
  const detail = document.getElementById("detail-view");
  if (route === "home") {
    detail.classList.add("hidden");
    document.body.classList.remove("sheet-open");
  } else {
    detail.classList.remove("hidden");
    document.body.classList.add("sheet-open");
    setActivePanel(ASSETS.indexOf(route), false);
    detail.scrollTo({ top: 0 });
  }
}

function navigate(route) {
  if (route === "home") {
    if (window.location.hash !== "" && window.location.hash !== "#/") {
      window.location.hash = "#/";
    } else {
      applyRoute("home");
    }
  } else {
    window.location.hash = `#/${route}`;
  }
}

function navigateDetail(idx) {
  setActivePanel(idx, true);
  // Replace state so swipe doesn't pollute history
  const newHash = `#/${ASSETS[idx]}`;
  if (window.location.hash !== newHash) {
    history.replaceState(null, "", newHash);
  }
}

window.addEventListener("hashchange", () => {
  applyRoute(routeFromHash());
});

/* Swipe gestures */
function attachSwipe() {
  const container = document.getElementById("swipe-container");
  const track = document.getElementById("swipe-track");
  let startX = 0, startY = 0, lastX = 0, dragging = false, locked = null;

  container.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    lastX = startX;
    dragging = true;
    locked = null;
    track.style.transition = "none";
  }, { passive: true });

  container.addEventListener("touchmove", e => {
    if (!dragging) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    const dy = y - startY;
    if (locked === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
      }
    }
    if (locked === "x") {
      e.preventDefault();
      lastX = x;
      const w = container.offsetWidth;
      const dragPct = (dx / w) * 50;
      let target = -activeIdx * 50 + dragPct;
      if (target > 0) target = target / 3;
      if (target < -50) target = -50 + (target + 50) / 3;
      track.style.transform = `translateX(${target}%)`;
    }
  }, { passive: false });

  container.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    if (locked !== "x") { locked = null; return; }
    const dx = lastX - startX;
    const threshold = container.offsetWidth * 0.2;
    let targetIdx = activeIdx;
    if (dx < -threshold && activeIdx < ASSETS.length - 1) targetIdx = activeIdx + 1;
    else if (dx > threshold && activeIdx > 0) targetIdx = activeIdx - 1;
    navigateDetail(targetIdx);
    locked = null;
  });

  container.addEventListener("touchcancel", () => {
    if (!dragging) return;
    dragging = false;
    locked = null;
    setActivePanel(activeIdx, true);
  });
}

/* Keyboard arrows on detail */
document.addEventListener("keydown", e => {
  if (routeFromHash() === "home") return;
  if (e.key === "ArrowLeft" && activeIdx > 0) {
    navigateDetail(activeIdx - 1);
  } else if (e.key === "ArrowRight" && activeIdx < ASSETS.length - 1) {
    navigateDetail(activeIdx + 1);
  } else if (e.key === "Escape") {
    navigate("home");
  }
});

/* Back chevron + backdrop tap → close sheet */
document.getElementById("back-btn").addEventListener("click", () => navigate("home"));
document.getElementById("sheet-backdrop").addEventListener("click", () => navigate("home"));

/* Bootstrap */
fetch("data.json?_t=" + Date.now())
  .then(r => r.json())
  .then(data => {
    appData = data;
    renderHome(data);
    renderDetail(data);
    attachSwipe();
    applyRoute(routeFromHash());
  })
  .catch(err => {
    console.error("Failed to load data.json:", err);
    document.getElementById("home-narrative").textContent = "Błąd ładowania danych.";
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoFlop — Mgłomierz (wersja koncepcyjna v2)</title>
<link rel="icon" type="image/svg+xml" href="logo/cryptoflop-monogram.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Mgłomierz — dzień (porcelanowa mgła) */
    --fog:    #E4E5E1;   /* tło — chłodna mgła */
    --enamel: #F6F5F0;   /* porcelanowa tarcza / karty */
    --enamel-2:#EEEDE7;
    --ink:    #1B2A2E;   /* atrament — tekst, grawerka */
    --ink-soft:#5B6A6C;
    --ink-faint:#8A9698;
    --brass:  #A8823C;   /* mosiądz — wskazówka, hairline; NIE niesie znaczenia */
    --line:   #CFD0CA;
    --green:  #1B7A57;   /* strefa OKAZJA / lampka good */
    --rust:   #AB4530;   /* strefa DROGO / lampka warn */
    --sage:   #8B9A93;   /* neutrum */
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --grot: "Hanken Grotesk", system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      /* Mgłomierz — zmierzch (podświetlany cyferblat we mgle) */
      --fog:    #131e1d;
      --enamel: #1B2725;
      --enamel-2:#22302d;
      --ink:    #DCE4E1;
      --ink-soft:#9DAAA7;
      --ink-faint:#6B7976;
      --brass:  #C7A06A;
      --line:   #2C3A37;
      --green:  #46B488;
      --rust:   #D2705A;
      --sage:   #8B9A93;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--fog); color: var(--ink);
    font-family: var(--grot); font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 22px 20px 80px; }

  /* koncept banner */
  .concept {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); border: 1px solid var(--line); border-radius: 980px;
    padding: 6px 12px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 22px;
  }
  .concept a { color: var(--brass); text-decoration: none; }
  .concept .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brass); }

  header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--brass); }
  .brand { font-family: var(--mono); font-weight: 600; font-size: 17px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink); }
  .date { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; }
  .vignette { font-size: 14px; color: var(--ink-soft); margin: 12px 2px 26px; line-height: 1.45; }

  /* przyrząd / panel */
  .instrument {
    background: var(--enamel); border: 1px solid var(--line); border-radius: 18px;
    padding: 18px 20px 22px; margin-bottom: 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
  }
  .ident { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .ident .nm { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; color: var(--ink); }
  .ident .nm small { color: var(--ink-faint); font-weight: 400; }
  .ident .pr { font-family: var(--mono); font-size: 14px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .ident .pr .chg { font-size: 12px; margin-left: 6px; }
  .chg.up { color: var(--green); } .chg.down { color: var(--rust); } .chg.flat { color: var(--ink-faint); }

  /* łuk */
  .dial { margin: 6px 0 2px; }
  .dial svg { display: block; width: 100%; height: auto; overflow: visible; }
  .arc-end { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; fill: var(--ink-faint); }
  .needle-g { transform-box: view-box; transform-origin: 180px 176px; animation: settle 820ms cubic-bezier(.2,.72,.2,1) both; }
  @keyframes settle { 0%{transform:rotate(40deg)} 72%{transform:rotate(-5deg)} 100%{transform:rotate(0)} }
  @media (prefers-reduced-motion: reduce){ .needle-g{ animation: none; } }

  .readout { text-align: center; margin-top: 2px; }
  .readout .word { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: 0.14em; }
  .readout .val { font-family: var(--mono); font-size: 13px; color: var(--ink-faint); margin-left: 6px; letter-spacing: 0.05em; }
  .readout .sentence { font-size: 14.5px; color: var(--ink); margin: 7px auto 0; max-width: 42ch; line-height: 1.45; }
  .drift { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em; color: var(--ink-soft); margin-top: 8px; }
  .drift .ar { color: var(--ink-faint); }

  /* barograf */
  .baro { margin: 18px 0 4px; }
  .baro-h { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .baro svg { display: block; width: 100%; height: auto; }
  .baro-axis { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9.5px; color: var(--ink-faint); margin-top: 3px; letter-spacing: 0.04em; }

  /* sygnały — odczyty z lampkami */
  .signals { margin-top: 16px; border-top: 1px solid var(--line); }
  .sig { display: grid; grid-template-columns: 16px 96px 1fr; align-items: baseline; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .sig:last-child { border-bottom: none; }
  .lamp { width: 9px; height: 9px; border-radius: 50%; align-self: center; box-shadow: 0 0 0 3px rgba(0,0,0,0.02); }
  .lamp.good { background: var(--green); } .lamp.warn { background: var(--rust); } .lamp.neutral { background: var(--sage); }
  .sig .lab { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); }
  .sig .txt { font-size: 13.5px; color: var(--ink); line-height: 1.4; }

  /* prognoza meta */
  .fc-meta { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .fc-head { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); display: flex; gap: 10px; align-items: baseline; }
  .fc-head .band { color: var(--ink); }
  .fc-rules { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 0; }
  .fc-chip { font-family: var(--mono); font-size: 11px; border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px; color: var(--ink-soft); letter-spacing: 0.02em; }
  .fc-chip b { color: var(--ink); font-weight: 600; }
  .fc-chip .p { color: var(--green); } .fc-chip .n { color: var(--rust); }
  .fc-disc { font-size: 11px; font-style: italic; color: var(--ink-faint); margin-top: 10px; line-height: 1.5; }

  footer { margin-top: 30px; padding-top: 18px; border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.03em; line-height: 1.8; }
  footer a { color: var(--brass); text-decoration: none; }
  .err { text-align:center; color: var(--ink-soft); padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="concept"><span class="dot"></span> Wersja koncepcyjna · v2 „Mgłomierz" · <a href="index.html">wróć do wersji żywej</a></div>

  <header class="top">
    <div class="brand">Cryptoflop</div>
    <div class="date" id="date"></div>
  </header>
  <div class="vignette" id="vignette"></div>

  <div id="panels"></div>

  <footer>
    Przyrząd mierzy stan obecny — nie przewiduje ceny.<br>
    Łuk = pozycja okazji 0–100 · barograf = 30 dni + przedłużenie to prognoza okna (nie ceny).<br>
    Dane: CoinGecko · alternative.me. &nbsp;© 2026 Marcin Gałęcki · <a href="zasady.html">zasady działania</a>
  </footer>
</div>

<script>
const CX=180, CY=176, R=158;

function zoneColor(v){
  if(v<22) return '#9c3a2b';
  if(v<35) return '#b0572f';
  if(v<42) return '#b0793f';
  if(v<55) return '#8b9a93';
  if(v<66) return '#6f9d80';
  if(v<76) return '#4f9b76';
  if(v<84) return '#2f8a63';
  if(v<90) return '#1f7a57';
  return '#136048';
}
const clamp=(v)=>Math.max(0,Math.min(100,v));
const pol=(r,deg)=>{ const a=deg*Math.PI/180; return [CX+r*Math.cos(a), CY-r*Math.sin(a)]; };
const degFor=(v)=>180-1.8*clamp(v);

function buildDial(opp, prev){
  let s=`<svg viewBox="0 0 360 200" role="img" aria-label="Wskaźnik okazji ${opp} na 100">`;
  // ticks co 5
  for(let v=0; v<=100; v+=5){
    const d=degFor(v); const [ox,oy]=pol(R,d); const len=(v%25===0)?15:9; const [ix,iy]=pol(R-len,d);
    s+=`<line x1="${ix.toFixed(1)}" y1="${iy.toFixed(1)}" x2="${ox.toFixed(1)}" y2="${oy.toFixed(1)}" stroke="${zoneColor(v)}" stroke-width="${v%25===0?3:2}" stroke-linecap="round"/>`;
  }
  // progi 42 / 84
  [42,84].forEach(v=>{ const d=degFor(v); const [ox,oy]=pol(R,d); const [ix,iy]=pol(R-24,d);
    s+=`<line x1="${ix.toFixed(1)}" y1="${iy.toFixed(1)}" x2="${ox.toFixed(1)}" y2="${oy.toFixed(1)}" stroke="var(--ink)" stroke-width="1.5" opacity="0.4"/>`; });
  // wskazówka-cień (wczoraj)
  if(prev!=null && Math.abs(opp-prev)>=2){
    const d=degFor(prev); const [gx1,gy1]=pol(R,d); const [gx2,gy2]=pol(R-15,d);
    s+=`<line x1="${gx2.toFixed(1)}" y1="${gy2.toFixed(1)}" x2="${gx1.toFixed(1)}" y2="${gy1.toFixed(1)}" stroke="var(--ink)" stroke-width="2.5" opacity="0.3"/>`;
    const [lx,ly]=pol(R+12,d);
    s+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" class="arc-end" text-anchor="middle">wczoraj</text>`;
  }
  // wskazówka (mosiądz, neutralny metal)
  const d=degFor(opp); const [nx,ny]=pol(R-28,d);
  s+=`<g class="needle-g"><line x1="${CX}" y1="${CY}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="var(--brass)" stroke-width="3.2" stroke-linecap="round"/>`;
  s+=`<circle cx="${CX}" cy="${CY}" r="6.5" fill="var(--brass)"/><circle cx="${CX}" cy="${CY}" r="2.4" fill="var(--enamel)"/></g>`;
  // etykiety końców
  s+=`<text x="${CX-R+4}" y="${CY+15}" class="arc-end" text-anchor="start">DROGO</text>`;
  s+=`<text x="${CX+R-4}" y="${CY+15}" class="arc-end" text-anchor="end">OKAZJA</text>`;
  s+=`</svg>`;
  return s;
}

function buildBaro(opp30, fc){
  const W=360,H=96,padL=6,padR=6,padT=8,padB=4;
  const today=opp30.length-1, maxIdx=today+7;
  const xF=(i)=>padL+i*(W-padL-padR)/maxIdx;
  const yF=(v)=>padT+(1-clamp(v)/100)*(H-padT-padB);
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Barograf 30 dni i prognoza">`;
  s+=`<defs><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="var(--brass)" stroke-width="1" opacity="0.55"/></pattern></defs>`;
  // pasma pogodowe
  s+=`<rect x="0" y="${yF(100)}" width="${W}" height="${yF(84)-yF(100)}" fill="var(--green)" opacity="0.12"/>`;
  s+=`<rect x="0" y="${yF(84)}" width="${W}" height="${yF(42)-yF(84)}" fill="var(--sage)" opacity="0.10"/>`;
  s+=`<rect x="0" y="${yF(42)}" width="${W}" height="${yF(0)-yF(42)}" fill="var(--rust)" opacity="0.10"/>`;
  // linie progów
  [42,84].forEach(v=>{ s+=`<line x1="0" y1="${yF(v)}" x2="${W}" y2="${yF(v)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 4"/>`; });
  // ślad przeszłości
  const pts=opp30.map((v,i)=>`${xF(i).toFixed(1)},${yF(v).toFixed(1)}`).join(' ');
  s+=`<polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  // separator dziś
  const xT=xF(today), yT=yF(opp30[today]);
  s+=`<line x1="${xT.toFixed(1)}" y1="${padT}" x2="${xT.toFixed(1)}" y2="${H-padB}" stroke="var(--ink-faint)" stroke-width="1" opacity="0.35"/>`;
  // stożek prognozy (przedłużenie śladu)
  if(fc && fc.score_range){
    const [lo,hi]=fc.score_range; const xE=xF(maxIdx);
    s+=`<path d="M${xT.toFixed(1)},${yT.toFixed(1)} L${xE.toFixed(1)},${yF(hi).toFixed(1)} L${xE.toFixed(1)},${yF(lo).toFixed(1)} Z" fill="url(#hatch)" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`;
    const mid=(lo+hi)/2;
    s+=`<line x1="${xT.toFixed(1)}" y1="${yT.toFixed(1)}" x2="${xE.toFixed(1)}" y2="${yF(mid).toFixed(1)}" stroke="var(--ink)" stroke-width="1.4" stroke-dasharray="2 3" opacity="0.55"/>`;
  }
  s+=`<circle cx="${xT.toFixed(1)}" cy="${yT.toFixed(1)}" r="2.6" fill="var(--ink)"/>`;
  s+=`</svg>`;
  return s;
}

function lampClass(t){ return t==='good'?'good':t==='warn'?'warn':'neutral'; }

function panelHtml(a){
  const v=a.verdict||{}, fc=a.forecast||{};
  const opp=a.opp, prev=(a.opp_30d&&a.opp_30d.length>=2)?a.opp_30d[a.opp_30d.length-2]:null;
  const zc=zoneColor(opp);
  const chg=a.price_change_24h;
  const chgCls=chg>0?'up':chg<0?'down':'flat';
  const chgStr=(chg>0?'+':'')+String(chg).replace('.',',')+'%';
  // dryf zwerbalizowany
  let drift='ciśnienie stabilne <span class="ar">→</span> okno bez zmian';
  if(prev!=null){ const d=opp-prev;
    if(d>=2) drift='ciśnienie spada <span class="ar">↓</span> okno zakupu się otwiera';
    else if(d<=-2) drift='ciśnienie rośnie <span class="ar">↑</span> okno się domyka';
  }
  const sigs=(v.signals||[]).map(s=>`<div class="sig"><span class="lamp ${lampClass(s.tone)}"></span><span class="lab">${s.label}</span><span class="txt">${s.text}</span></div>`).join('');
  const rules=(fc.rules||[]).map(r=>{ const cls=r.delta>0?'p':r.delta<0?'n':''; const sign=r.delta>0?'+':''; return `<span class="fc-chip"><b>${r.name}</b> <span class="${cls}">${sign}${r.delta}</span></span>`; }).join('');
  const band = fc.clamped==='hi'?`≥ ${fc.score_range[0]}`: fc.clamped==='lo'?`≤ ${fc.score_range[1]}`: fc.score_range?`pasmo ${fc.score_range[0]}–${fc.score_range[1]}`:'';
  const confPl={low:'niska',medium:'średnia',high:'wysoka'}[fc.confidence]||'';
  return `<div class="instrument">
    <div class="ident">
      <span class="nm">${a.name} <small>· ${a.sub}</small></span>
      <span class="pr">${a.price}<span class="chg ${chgCls}">${chgStr}</span></span>
    </div>
    <div class="dial">${buildDial(opp, prev)}</div>
    <div class="readout">
      <span class="word" style="color:${zc}">${v.word||''}</span><span class="val">${opp} / 100</span>
      <div class="sentence">${v.headline||''}</div>
      <div class="drift">${drift}</div>
    </div>
    <div class="baro">
      <div class="baro-h"><span>Barograf — 30 dni + prognoza</span></div>
      ${buildBaro(a.opp_30d||[opp], fc)}
      <div class="baro-axis"><span>30 dni temu</span><span>dziś</span><span>+7 dni</span></div>
    </div>
    <div class="signals">${sigs}</div>
    <div class="fc-meta">
      <div class="fc-head"><span>Prognoza okna · 7 dni</span><span class="band">${band}</span><span>pewność: ${confPl}</span></div>
      <div class="fc-rules">${rules}</div>
      <div class="fc-disc">Pasmo dotyczy OKAZJI, nie ceny — przedłużenie śladu w przód to rule-based ekstrapolacja widocznego układu. Spodziewaj się odchyleń przy szybkich ruchach rynku.</div>
    </div>
  </div>`;
}

function vignette(assets){
  const avg=Math.round(assets.reduce((s,a)=>s+a.opp,0)/assets.length);
  if(avg>=84) return 'Gęsta mgła strachu nad rynkiem — okna zakupu szeroko otwarte.';
  if(avg>=60) return 'Pochmurno, ceny nisko — sprzyjająca aura do spokojnego dokupowania.';
  if(avg>=42) return 'Zmienne ciśnienie — zwykły dzień, kupuj wg planu.';
  return 'Wyż, jasno i drogo — rozsądniej przeczekać.';
}

fetch('data.json?_t='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    document.getElementById('date').textContent=(data.header_label||'').toLowerCase();
    document.getElementById('vignette').textContent=vignette(data.assets||[]);
    document.getElementById('panels').innerHTML=(data.assets||[]).map(panelHtml).join('');
  })
  .catch(()=>{ document.getElementById('panels').innerHTML='<div class="err">Nie udało się załadować danych.</div>'; });
</script>
</body>
</html>
